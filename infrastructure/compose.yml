services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5555:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  provision:
    build:
      context: ./postgres
    environment:
      DB_HOST: database
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    depends_on:
      database:
        condition: service_healthy
    restart: 'no'

  auth:
    build:
      dockerfile: bun.base.dockerfile
      context: .
    volumes:
      - ../:/usr/src/app
    command: bun dev:auth
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@database:5432/auth_db
    depends_on:
      provision:
        condition: service_completed_successfully

volumes:
  postgres_data:
